<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horários Pro</title>
    <style>
        :root {
            --cor-manha: #a8dadc;
            --cor-tarde: #f4a261;
            --cor-noite: #264653;
            --bg-site: #f0f2f5;
            --bg-exibicao: rgba(255, 255, 255, 0.8); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-site);
            overflow: hidden;
            height: 100vh;
        }

        /* --- TELA 1: MENU --- */
        #tela-principal {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .container-menu {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        h1 { margin-bottom: 30px; font-weight: 300; color: #444; letter-spacing: -1px; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-manha { background-color: var(--cor-manha); color: #1d3557; }
        .btn-tarde { background-color: var(--cor-tarde); color: white; }
        .btn-noite { background-color: var(--cor-noite); color: #e9c46a; }

        /* --- TELA 2: EXIBIÇÃO --- */
        #tela-imagem {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-exibicao);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 100;
        }

        /* Contentor que organiza imagem e botão em coluna */
        .wrapper-imagem {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; /* Coloca um debaixo do outro */
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #imagem-exibida {
            max-width: 100%;
            max-height: 75vh; /* Reserva espaço para o botão em baixo */
            object-fit: contain;
            border-radius: 10px;
            opacity: 0;
            margin-bottom: 20px; /* Espaço entre imagem e botão */
        }

        /* NOVO BOTÃO FECHAR ABAIXO DA IMAGEM */
        .btn-fechar-baixo {
            padding: 12px 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px; /* Retângulo com cantos arredondados */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
            opacity: 0; /* Começa invisível para animar junto */
        }

        .btn-fechar-baixo:active {
            background: #eee;
            transform: scale(0.95);
        }

        /* ANIMAÇÃO DE ENTRADA (Imagem e Botão) */
        .animar-entrada {
            animation: surgir 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes surgir {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* AJUSTE PAISAGEM MOBILE (Rotação preserva a ordem Imagem -> Botão) */
        @media screen and (orientation: portrait) {
            .wrapper-imagem {
                transform: rotate(90deg);
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: 50%;
                left: 50%;
                translate: -50% -50%;
            }
        }
    </style>
</head>
<body>

    <div id="tela-principal">
        <div class="container-menu">
            <h1>Horários</h1>
            <div class="button-group">
                <button class="btn btn-manha" onclick="abrirTela('manha.png')">Manhã</button>
                <button class="btn btn-tarde" onclick="abrirTela('tarde.png')">Tarde</button>
                <button class="btn btn-noite" onclick="abrirTela('noite.png')">Noite</button>
            </div>
        </div>
    </div>

    <div id="tela-imagem">
        <div class="wrapper-imagem">
            <img id="imagem-exibida" src="" alt="Horário">
            <button id="btn-fechar" class="btn-fechar-baixo" onclick="voltarParaMenu()">FECHAR</button>
        </div>
    </div>

    <script>
        function abrirTela(src) {
            const tela = document.getElementById('tela-imagem');
            const img = document.getElementById('imagem-exibida');
            const btn = document.getElementById('btn-fechar');
            
            img.classList.remove('animar-entrada');
            btn.classList.remove('animar-entrada');
            
            img.src = src;
            tela.style.display = 'block';
            
            // Ativa a animação nos dois elementos
            setTimeout(() => {
                img.classList.add('animar-entrada');
                btn.classList.add('animar-entrada');
            }, 50);
        }

        function voltarParaMenu() {
            const tela = document.getElementById('tela-imagem');
            const img = document.getElementById('imagem-exibida');
            const btn = document.getElementById('btn-fechar');
            
            tela.style.display = 'none';
            img.classList.remove('animar-entrada');
            btn.classList.remove('animar-entrada');
            img.src = "";
        }
    </script>
</body>
</html>
